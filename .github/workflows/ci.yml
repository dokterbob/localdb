name: CI

on:
  push:
    branches: ["main", "ticket/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - name: Run clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: Build workspace
        run: cargo build --workspace
      - name: Run tests
        run: cargo test --workspace

  coverage:
    name: Coverage gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage (all tests)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Check coverage gates
        # Gate: ≥80% line coverage across the workspace.
        # Data-modifying paths should hit ≥90% but this workspace-level gate
        # is enforced at 80%; per-crate gates are checked per ticket via the
        # summary report.
        run: |
          cargo llvm-cov report --summary-only
          # Fail if line coverage drops below 80%.
          COVERAGE=$(cargo llvm-cov report --summary-only 2>/dev/null \
            | grep 'TOTAL' | awk '{print $10}' | tr -d '%')
          echo "Workspace line coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "ERROR: Could not parse coverage output."
            exit 1
          fi
          if [ "$(echo "$COVERAGE < 80" | bc -l)" = "1" ]; then
            echo "ERROR: Coverage ${COVERAGE}% is below the 80% gate."
            exit 1
          fi
      - name: Upload coverage to Codecov (informational)
        uses: codecov/codecov-action@v4
        if: github.event_name == 'pull_request'
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Demonstrate the coverage gate: this job has a dummy function with a test.
  # The function and test live in the core crate (error.rs / tests).
  # If tests are removed, coverage will drop and the coverage job will fail.
  build-all-platforms:
    name: Cross-compile check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (aarch64-linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
      - name: Check workspace builds for target
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --workspace --target ${{ matrix.target }}
